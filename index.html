<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta de Renovación de Celulares 2026 — Ternova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --orange:      #F47B20;
      --orange-h:    #FF8F35;
      --orange-d:    #C86010;
      --orange-pale: #FFF4EC;
      --purple:      #5C3D8F;
      --purple-h:    #7A56B8;
      --purple-pale: #F2EDFA;
      --ink:         #0F1117;
      --ink-2:       #1A1D27;
      --ink-3:       #252836;
      --muted:       #64748B;
      --subtle:      #94A3B8;
      --rule:        #E2E8F0;
      --bg:          #F1F3F7;
      --card:        #FFFFFF;
      --f: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── TOPBAR ── */
    .topbar { background: var(--ink-2); position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(255,255,255,.06); }
    .topbar-inner { max-width: 1120px; margin: auto; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-mark { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; background: linear-gradient(135deg, var(--orange), var(--orange-h)); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(244,123,32,.36); }
    .brand-mark svg { color: #fff; }
    .brand-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.2px; }
    .brand-sep { width: 1px; height: 14px; background: rgba(255,255,255,.12); }
    .brand-dept { font-size: 11.5px; color: rgba(255,255,255,.32); }
    .top-badge { font-size: 11px; font-weight: 600; color: var(--orange); border: 1.5px solid rgba(244,123,32,.22); background: rgba(244,123,32,.07); padding: 3px 10px; border-radius: 40px; }

    /* ══════════════════════════════════════
       SEARCH SECTION — the whole top block
    ══════════════════════════════════════ */
    .search-section {
      background: linear-gradient(160deg, var(--ink-2) 0%, var(--ink-3) 55%, #1e1430 100%);
      padding: 20px 24px 18px;
      position: relative; overflow: hidden;
    }
    .orb1 { position: absolute; top: -60px; right: -40px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(92,61,143,.22) 0%, transparent 70%); pointer-events: none; }
    .orb2 { position: absolute; bottom: -70px; left: 6%; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(244,123,32,.12) 0%, transparent 70%); pointer-events: none; }
    .ss-inner { max-width: 1120px; margin: auto; position: relative; z-index: 1; }

    .ss-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
    .ss-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; line-height: 1.2; }
    .ss-title em { font-style: normal; color: var(--orange); }
    .ss-sub { font-size: 12px; color: rgba(255,255,255,.35); }

    /* BIG INPUT ROW */
    .search-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
    .iw { flex: 1; position: relative; min-width: 0; }
    .iw-icon { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: var(--orange); pointer-events: none; }
    #searchInput {
      width: 100%; height: 46px;
      padding: 0 18px 0 46px;
      font-family: var(--f); font-size: 15px; font-weight: 500;
      color: #fff; caret-color: var(--orange);
      background: rgba(255,255,255,.08);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 11px; outline: none;
      transition: border-color .18s, background .18s, box-shadow .18s;
    }
    #searchInput::placeholder { color: rgba(255,255,255,.28); font-weight: 400; font-size: 13.5px; }
    #searchInput:focus { border-color: var(--orange); background: rgba(255,255,255,.11); box-shadow: 0 0 0 3px rgba(244,123,32,.16); }
    .btn-go {
      height: 46px; padding: 0 22px;
      background: var(--orange); color: #fff;
      font-family: var(--f); font-size: 14px; font-weight: 700;
      border: none; border-radius: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 4px 18px rgba(244,123,32,.38);
      transition: background .15s, transform .15s, box-shadow .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-go:hover { background: var(--orange-h); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(244,123,32,.48); }
    .btn-go:active { transform: none; }
    .btn-clr {
      height: 46px; width: 46px; flex-shrink: 0;
      background: rgba(255,255,255,.06); color: rgba(255,255,255,.38);
      border: 2px solid rgba(255,255,255,.10); border-radius: 11px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-clr:hover { background: rgba(255,255,255,.11); color: rgba(255,255,255,.65); border-color: rgba(255,255,255,.18); }

    /* ── BOTTOM META BAR — stats + filters + view toggle in ONE line ── */
    .meta-bar {
      display: flex; align-items: center; gap: 0;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; overflow: hidden;
    }

    /* stat pills */
    .ms { display: flex; align-items: center; gap: 7px; padding: 0 12px; height: 32px; border-right: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
    .ms-ico { color: rgba(255,255,255,.30); display: flex; }
    .ms-val { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.75); }
    .ms-lbl { font-size: 11px; color: rgba(255,255,255,.28); }

    /* divider text */
    .mb-sep { width: 1px; height: 20px; background: rgba(255,255,255,.08); flex-shrink: 0; }

    /* filter chips inside bar */
    .mb-filters { display: flex; align-items: center; gap: 5px; padding: 0 10px; flex: 1; }
    .mb-flbl { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.22); text-transform: uppercase; letter-spacing: .9px; margin-right: 2px; white-space: nowrap; }
    .mchip {
      height: 24px; padding: 0 10px; border-radius: 40px;
      border: 1px solid rgba(255,255,255,.12); background: transparent;
      font-family: var(--f); font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.40); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .14s; white-space: nowrap;
    }
    .mchip svg { width: 10px; height: 10px; }
    .mchip:hover:not(.on) { border-color: rgba(255,255,255,.28); color: rgba(255,255,255,.70); }
    .mchip.on { background: var(--purple); border-color: var(--purple); color: #fff; box-shadow: 0 2px 8px rgba(92,61,143,.30); }

    /* view toggle inside bar */
    .mb-view { display: flex; align-items: center; gap: 3px; padding: 0 8px; border-left: 1px solid rgba(255,255,255,.07); }
    .mvt { width: 26px; height: 26px; border-radius: 5px; border: none; background: transparent; color: rgba(255,255,255,.28); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .14s; }
    .mvt.on { background: rgba(255,255,255,.10); color: rgba(255,255,255,.80); }
    .mvt:hover:not(.on) { color: rgba(255,255,255,.55); }

    /* tiny hints */
    .hints { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
    .hint { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 400; color: rgba(255,255,255,.28); }
    .hint code { font-family: 'SF Mono','Fira Code',monospace; font-size: 10.5px; color: rgba(255,255,255,.45); background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 4px; }
    .hint-dot { color: rgba(255,255,255,.12); }

    /* ── MAIN ── */
    .main { max-width: 1120px; margin: 0 auto; padding: 24px 24px 80px; }
    .res-meta { margin-bottom: 16px; }
    .res-count { font-size: 14px; color: var(--muted); }
    .res-count strong { font-size: 20px; font-weight: 800; color: var(--ink); margin-right: 3px; }

    /* ── CARDS ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 14px; }
    .rcard { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.05); transition: transform .2s, box-shadow .2s; }
    .rcard:hover { transform: translateY(-3px); box-shadow: 0 6px 28px rgba(0,0,0,.11); }
    .rcard-top { padding: 12px 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .rct-expo { background: linear-gradient(100deg, #1A1D27 0%, #2e1b55 100%); }
    .rct-enco { background: linear-gradient(100deg, #1A1D27 0%, #3d1800 100%); }
    .rcard-co-dot { width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0; background: rgba(255,255,255,.09); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.45); }
    .rcard-co-name { font-size: 9.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,.52); }
    .rcard-body { padding: 15px 15px 17px; }
    .rcard-user { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 13px; }
    .av { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--purple), var(--purple-h)); display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 800; color: #fff; }
    .rcard-name { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; line-height: 1.25; }
    .rcard-note { font-size: 10.5px; color: var(--subtle); font-style: italic; margin-top: 2px; line-height: 1.4; }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .fi { background: var(--bg); border: 1px solid var(--rule); border-radius: 8px; padding: 8px 10px; }
    .fi.s2 { grid-column: 1/-1; }
    .fk { font-size: 9px; font-weight: 700; color: var(--subtle); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
    .fk svg { width: 10px; height: 10px; }
    .fv { font-size: 12.5px; font-weight: 500; color: var(--ink); word-break: break-all; line-height: 1.3; }
    .fv.dim { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .pill svg { width: 10px; height: 10px; flex-shrink: 0; }
    .pill-p { background: var(--purple-pale); color: var(--purple); }
    .pill-o { background: var(--orange-pale); color: var(--orange-d); }

    /* ── TABLE ── */
    .tframe { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--ink-2); }
    thead th { padding: 12px 14px; text-align: left; font-size: 10px; font-weight: 600; color: rgba(255,255,255,.38); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--rule); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8ff; }
    tbody td { padding: 11px 14px; vertical-align: middle; }

    /* ── EMPTY ── */
    .empty { background: var(--card); border: 1px solid var(--rule); border-radius: 16px; padding: 64px 24px; text-align: center; }
    .empty-ico { width: 52px; height: 52px; border-radius: 50%; background: var(--bg); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; color: var(--subtle); }
    .empty h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .empty p { font-size: 13px; color: var(--subtle); line-height: 1.6; }

    mark { background: rgba(244,123,32,.20); color: var(--orange-d); border-radius: 3px; padding: 0 2px; font-weight: 600; }

    footer { background: var(--ink-2); padding: 18px 24px; }
    .foot { max-width: 1120px; margin: auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .foot-l { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.25); }
    .foot-l span { color: var(--orange); }
    .foot-r { font-size: 11px; color: rgba(255,255,255,.16); }

    @media(max-width:700px){
      .search-row { flex-direction: column; }
      .btn-go { height: 50px; }
      .btn-clr { height: 50px; width: 50px; }
      #searchInput { height: 50px; }
      .meta-bar { flex-wrap: wrap; }
      .ms { border-right: none; border-bottom: 1px solid rgba(255,255,255,.07); }
      .grid { grid-template-columns: 1fr; }
      .fg { grid-template-columns: 1fr; }
    }
  </style>
</head>

</section>

let cFilter = 'all', cView = 'cards';

function init() {
  lucide.createIcons();
  document.getElementById('sTotal').textContent = DB.length;
  document.getElementById('sAssigned').textContent = DB.filter(r => r['Usuario']?.trim()).length;
  renderAll();
}

function setFilter(f) {
  cFilter = f;
  ['all','termoexport','termoencogibles'].forEach(id =>
    document.getElementById('f-'+id).classList.toggle('on', id === f));
  const q = document.getElementById('searchInput').value.trim();
  q.length >= 3 ? doSearch() : renderAll();
}

function byCompany(d) {
  if (cFilter === 'all') return d;
  if (cFilter === 'termoexport')
    return d.filter(r => (r['Empresa / Compañía']||'').toLowerCase().includes('termoexport')
                      && !(r['Empresa / Compañía']||'').toLowerCase().includes('termoencogibles'));
  return d.filter(r => (r['Empresa / Compañía']||'').toLowerCase().includes('termoencogibles'));
}

function normalize(p) {
  const s = String(p).replace(/\D/g,'');
  if (s.startsWith('503') && s.length===11) return s;
  if (s.length===8) return '503'+s;
  return s;
}

function hl(t, q) {
  if (!q || !t) return t || '';
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(t).replace(re,'<mark>$1</mark>');
}

function coClass(n) {
  return (n||'').toLowerCase().includes('termoencogibles') ? 'rct-enco' : 'rct-expo';
}

function initials(n) {
  if (!n) return '?';
  const p = n.trim().split(/\s+/);
  return (p[0][0]+(p[1]?.[0]||'')).toUpperCase();
}

function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  if (!raw || raw.length < 3) { renderAll(); return; }
  const nq = normalize(raw);
  const isIMEI = /^\d{14,15}$/.test(raw);
  let res = DB.filter(r => {
    if (isIMEI) return String(r['IMEI']).includes(raw);
    const np = normalize(r['Teléfono']);
    return np.includes(nq) || nq.includes(np.slice(-8));
  });
  res = byCompany(res);
  cView === 'cards' ? renderCards(res, raw.replace(/^503/,'')) : renderTable(res, raw.replace(/^503/,''));
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderAll();
}

function setView(v) {
  cView = v;
  document.getElementById('vtCards').classList.toggle('on', v==='cards');
  document.getElementById('vtTable').classList.toggle('on', v==='table');
  const q = document.getElementById('searchInput').value.trim();
  q.length >= 3 ? doSearch() : renderAll();
}

function renderAll() {
  cView === 'cards' ? renderCards(byCompany(DB),'') : renderTable(byCompany(DB),'');
}

function renderCards(data, q) {
  if (!data.length) { noResult(); return; }
  document.getElementById('results').innerHTML =
    `<div class="res-meta"><div class="res-count"><strong>${data.length}</strong> resultado${data.length!==1?'s':''} encontrado${data.length!==1?'s':''}</div></div>
     <div class="grid">${data.map(r=>cardHTML(r,q)).join('')}</div>`;
  lucide.createIcons();
}

function cardHTML(r, q) {
  const raw  = r['Usuario'] || '';
  const note = (raw.match(/\(([^)]+)\)/)||[])[1]||'';
  const name = raw.replace(/\s*\([^)]+\)/g,'').trim() || '(Sin asignar)';
  return `<div class="rcard">
    <div class="rcard-top ${coClass(r['Empresa / Compañía'])}">
      <div class="rcard-co-dot"><i data-lucide="building-2" style="width:11px;height:11px;"></i></div>
      <div class="rcard-co-name">${hl(r['Empresa / Compañía'],q)}</div>
    </div>
    <div class="rcard-body">
      <div class="rcard-user">
        <div class="av">${initials(name)}</div>
        <div>
          <div class="rcard-name">${hl(name,q)}</div>
          ${note?`<div class="rcard-note">${note}</div>`:''}
        </div>
      </div>
      <div class="fg">
        <div class="fi"><div class="fk"><i data-lucide="phone"></i>Teléfono</div><div class="fv">${hl(r['Teléfono'],q)}</div></div>
        <div class="fi"><div class="fk"><i data-lucide="cpu"></i>IMEI</div><div class="fv dim">${hl(r['IMEI'],q)}</div></div>
        <div class="fi s2"><div class="fk"><i data-lucide="smartphone"></i>Modelo</div><div class="fv">${hl(r['Modelo'],q)}</div></div>
        <div class="fi"><div class="fk"><i data-lucide="file-text"></i>Plan</div><div class="fv"><span class="pill pill-p"><i data-lucide="zap"></i>${hl(r['Plan'],q)}</span></div></div>
        <div class="fi"><div class="fk"><i data-lucide="package"></i>Paquete</div><div class="fv"><span class="pill pill-o"><i data-lucide="wifi"></i>${hl(r['Paquete'],q)}</span></div></div>
      </div>
    </div>
  </div>`;
}

function renderTable(data, q) {
  if (!data.length) { noResult(); return; }
  document.getElementById('results').innerHTML =
    `<div class="res-meta"><div class="res-count"><strong>${data.length}</strong> resultado${data.length!==1?'s':''} encontrado${data.length!==1?'s':''}</div></div>
     <div class="tframe"><table>
      <thead><tr><th>#</th><th>Empresa</th><th>Teléfono</th><th>Usuario</th><th>IMEI</th><th>Modelo</th><th>Plan</th><th>Paquete</th></tr></thead>
      <tbody>${data.map((r,i)=>{
        const nm=(r['Usuario']||'—').replace(/\s*\([^)]+\)/g,'').trim();
        return `<tr>
          <td style="color:var(--subtle);font-size:11px">${i+1}</td>
          <td style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">${hl(r['Empresa / Compañía'],q)}</td>
          <td style="font-weight:700">${hl(r['Teléfono'],q)}</td>
          <td style="font-weight:500">${hl(nm,q)}</td>
          <td style="font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums">${hl(r['IMEI'],q)}</td>
          <td style="font-size:12px">${hl(r['Modelo'],q)}</td>
          <td><span class="pill pill-p" style="font-size:10px"><i data-lucide="zap" style="width:9px;height:9px;"></i>${hl(r['Plan'],q)}</span></td>
          <td><span class="pill pill-o" style="font-size:10px"><i data-lucide="wifi" style="width:9px;height:9px;"></i>${hl(r['Paquete'],q)}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  lucide.createIcons();
}

function noResult() {
  document.getElementById('results').innerHTML = `
    <div class="empty">
      <div class="empty-ico"><i data-lucide="search-x" style="width:24px;height:24px;"></i></div>
      <h3>Sin resultados</h3>
      <p>No se encontró ningún equipo con ese número o IMEI.</p>
    </div>`;
  lucide.createIcons();
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input', e => {
  const v = e.target.value.trim();
  if (!v) renderAll(); else if (v.length >= 4) doSearch();
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
